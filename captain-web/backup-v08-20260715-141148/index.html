<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Captain's Log</title><script src="https://cdn.tailwindcss.com"></script><style>.panel{display:none}.panel.show{display:block}.tab.active{color:#1e3a8a;border-color:#1e3a8a;background:#eff6ff}</style></head><body class="bg-slate-50 text-slate-800"><header class="bg-blue-900 text-white"><div class="mx-auto flex h-24 max-w-screen-2xl items-center justify-between px-6"><div class="flex items-center gap-4"><img src="/logo.png" class="h-16 w-auto" alt="Captain's Log Logo"><div><p class="text-xs uppercase tracking-[.2em] text-blue-200">Requirements Control Center</p><h1 class="text-2xl font-bold">Captain's Log</h1></div></div><div class="flex items-center gap-3"><span id="session" class="text-sm"></span><button id="new" class="rounded bg-white px-4 py-2 font-semibold text-blue-900">Neue Anforderung</button></div></div></header><nav class="border-b bg-white"><div class="mx-auto flex max-w-screen-2xl px-6"><button class="tab active border-b-2 px-4 py-3" data-panel="requirements">Anforderungen</button><button class="tab border-b-2 border-transparent px-4 py-3" data-panel="workflow">Code & Tests</button><button class="tab border-b-2 border-transparent px-4 py-3" data-panel="documents">Dokumente</button><button class="tab border-b-2 border-transparent px-4 py-3" data-panel="history">Historie</button><button class="tab border-b-2 border-transparent px-4 py-3" data-panel="sync">Synchronisierung</button></div></nav><main class="mx-auto max-w-screen-2xl p-6"><section id="requirements" class="panel show"><div class="grid gap-5 lg:grid-cols-[350px_1fr]"><aside class="rounded border bg-white shadow"><div class="border-b p-3"><div class="mb-2 flex gap-2"><button class="mode rounded bg-blue-900 px-3 py-1 text-xs text-white" data-mode="all">Alle</button><button class="mode rounded border px-3 py-1 text-xs" data-mode="tree">Baum</button><button class="mode rounded border px-3 py-1 text-xs" data-mode="archive">Archiv</button></div><input id="search" class="w-full rounded border px-3 py-2 text-sm" placeholder="UID oder Titel"></div><div class="grid grid-cols-[72px_1fr_28px] bg-slate-100 px-3 py-2 text-xs font-bold"><span>UID</span><span>Titel</span><span>Sync</span></div><div id="items"></div></aside><article id="detail" class="rounded border bg-white p-6 shadow">Anforderung auswählen</article></div></section><section id="workflow" class="panel"><div class="grid gap-3 md:grid-cols-6"><button class="cmd rounded border bg-white p-5 shadow" data-command="tree" data-method="GET">Baum</button><button class="cmd rounded border bg-white p-5 shadow" data-command="status" data-method="GET">Status</button><button class="cmd rounded border bg-white p-5 shadow" data-command="scan">Scan</button><button class="cmd rounded border bg-white p-5 shadow" data-command="verify">Verify</button><button class="cmd rounded border bg-white p-5 shadow" data-command="validate">Validate</button><button class="cmd rounded border bg-white p-5 shadow" data-command="publish">Publish</button></div><pre id="commandOut" class="mt-4 min-h-48 overflow-auto rounded bg-slate-900 p-4 text-green-100"></pre></section><section id="documents" class="panel rounded border bg-white p-6 shadow"><div class="flex justify-between"><div><h2 class="text-xl font-bold text-blue-900">Dokumentbibliothek</h2><div class="mt-2 flex gap-2"><button id="activeDocs" class="rounded bg-blue-900 px-3 py-1 text-xs text-white">Aktiv</button><button id="archivedDocs" class="rounded border px-3 py-1 text-xs">Archiv</button></div></div><button id="globalLink" class="rounded bg-blue-900 px-4 py-2 text-white">Link anlegen</button></div><div id="library" class="mt-5"></div></section><section id="history" class="panel rounded border bg-white p-6 shadow"><button id="refreshHistory" class="rounded bg-blue-900 px-4 py-2 text-white">Aktualisieren</button><div id="events" class="mt-5 space-y-2"></div></section><section id="sync" class="panel rounded border bg-white p-6 shadow"><div class="flex gap-3"><button id="push" class="rounded bg-green-700 px-4 py-2 text-white">Push</button><button id="pull" class="rounded bg-blue-900 px-4 py-2 text-white">Pull</button></div><pre id="syncOut" class="mt-4 rounded bg-slate-900 p-4 text-green-100"></pre></section></main>
<div id="reqModal" class="fixed inset-0 hidden items-center justify-center bg-slate-950/50 p-4"><form id="reqForm" class="w-full max-w-2xl space-y-3 rounded bg-white p-6"><h2 id="reqHeading" class="text-xl font-bold"></h2><label class="block text-sm font-semibold">Typ<select id="type" class="mt-1 w-full rounded border p-2"><option>USR</option><option>SYS</option><option>SRS</option><option>SEC</option><option>ARCH</option><option>UT</option><option>IT</option><option>ST</option><option>RISK</option><option>CLASS</option></select></label><label class="block text-sm font-semibold">Titel<input id="title" required class="mt-1 w-full rounded border p-2"></label><label class="block text-sm font-semibold">Anforderungstext<textarea id="text" required rows="4" class="mt-1 w-full rounded border p-2"></textarea></label><label class="block text-sm font-semibold">Begründung <span class="font-normal text-slate-400">(optional)</span><textarea id="rationale" rows="2" class="mt-1 w-full rounded border p-2"></textarea></label><div id="links" class="grid grid-cols-2 gap-3"><select id="parents" multiple class="h-28 rounded border p-2"></select><select id="children" multiple class="h-28 rounded border p-2"></select></div><div class="flex justify-between"><button type="button" id="archiveReq" class="hidden rounded border border-orange-400 px-4 py-2 text-orange-700">Archivieren</button><button type="button" id="restoreReq" class="hidden rounded border border-green-500 px-4 py-2 text-green-700">Wiederherstellen</button><div class="ml-auto flex gap-2"><button type="button" id="cancelReq" class="rounded border px-4 py-2">Abbrechen</button><button class="rounded bg-blue-900 px-4 py-2 text-white">Speichern</button></div></div></form></div>
<div id="linkModal" class="fixed inset-0 hidden items-center justify-center bg-slate-950/50 p-4"><form id="linkForm" class="w-full max-w-lg space-y-3 rounded bg-white p-6"><h2 class="text-xl font-bold">Dokumentlink</h2><input id="linkUid" class="w-full rounded border p-2" placeholder="Requirement UID, leer = global"><select id="linkKind" class="w-full rounded border p-2"><option value="web_url">SharePoint / Web</option><option value="network_path">Netzwerkordner</option><option value="document_management_id">DMS-ID</option></select><input id="linkLabel" required class="w-full rounded border p-2" placeholder="Bezeichnung"><input id="linkLocation" required class="w-full rounded border p-2" placeholder="URL oder Pfad"><input id="linkVersion" class="w-full rounded border p-2" placeholder="Version"><div class="flex justify-between"><button type="button" id="archiveLink" class="hidden rounded border border-orange-400 px-4 py-2 text-orange-700">Archivieren</button><button type="button" id="restoreLink" class="hidden rounded border border-green-500 px-4 py-2 text-green-700">Wiederherstellen</button><div class="ml-auto flex gap-2"><button type="button" id="cancelLink" class="rounded border px-4 py-2">Abbrechen</button><button class="rounded bg-blue-900 px-4 py-2 text-white">Speichern</button></div></div></form></div>
<script>
const A='/api/v1',S={items:[],selected:null,mode:'all',editing:false,docs:[],docArchive:false,editingLink:null};const $=x=>document.getElementById(x),esc=x=>String(x??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');async function api(p,o={}){const r=await fetch(A+p,{headers:{'Content-Type':'application/json'},...o});const j=await r.json();if(!r.ok)throw Error(j.error?.message||r.status);return j}function show(id){$(id).classList.replace('hidden','flex')}function hide(id){$(id).classList.replace('flex','hidden')}function by(u){return S.items.find(x=>x.uid===u)}function short(x){return x.length>30?x.slice(0,30)+'...':x}function icon(x){return x.sync_state==='synchronized'?'✓':x.authority==='remote'?'◆':'●'}function row(x,d=0){return `<button data-uid="${x.uid}" class="grid w-full grid-cols-[72px_1fr_28px] border-b px-3 py-2 text-left text-xs hover:bg-blue-50" style="padding-left:${12+d*10}px"><b class="font-mono text-blue-900">${x.uid}</b><span>${esc(short(x.title))}</span><span>${icon(x)}</span></button>`}function branch(x,d=0,seen=new Set()){if(seen.has(x.uid))return `<div class="px-3 text-xs text-red-700">Zyklus: ${x.uid}</div>`;seen=new Set(seen);seen.add(x.uid);return row(x,d)+(x.children||[]).map(by).filter(y=>y&&y.status!=='Archived').map(y=>branch(y,d+1,seen)).join('')}function draw(){let v=S.mode==='archive'?S.items.filter(x=>x.status==='Archived'):S.items.filter(x=>x.status!=='Archived');const q=$('search').value.toLowerCase();v=v.filter(x=>!q||(x.uid+' '+x.title).toLowerCase().includes(q));$('items').innerHTML=S.mode==='tree'?v.filter(x=>!(x.parents||[]).length).map(x=>branch(x)).join(''):v.map(x=>row(x)).join('');$('items').querySelectorAll('[data-uid]').forEach(b=>b.onclick=()=>select(b.dataset.uid))}async function load(){S.items=(await api('/requirements')).items||[];draw();const v=S.items.filter(x=>x.status!=='Archived');const h=v.map(x=>`<option value="${x.uid}">${x.uid} · ${esc(short(x.title))}</option>`).join('');$('parents').innerHTML=h;$('children').innerHTML=h}async function select(u){
    S.selected=u;
    const x=by(u);
    const filesResponse=await api(`/requirements/${u}/files`);
    const commentsResponse=await api(`/requirements/${u}/comments`);
    const linkedFiles=(filesResponse.file_links||[]).filter(item=>!item.kind.startsWith('archived:'));
    const comments=commentsResponse.comments||[];
    const value=(text,fallback='Nicht dokumentiert')=>text?esc(text):fallback;
    const dateValue=text=>text?esc(text):'Nicht dokumentiert';
    $('detail').innerHTML=`
        <div class="flex flex-col gap-4 border-b border-slate-200 pb-5 md:flex-row md:items-start md:justify-between">
            <div>
                <div class="flex flex-wrap items-center gap-2">
                    <b class="font-mono text-sm text-blue-900">${esc(x.uid)}</b>
                    <span class="rounded-full border border-slate-200 bg-slate-100 px-2 py-0.5 text-xs font-semibold">${esc(x.type)}</span>
                    <span class="rounded-full border border-slate-200 bg-slate-50 px-2 py-0.5 text-xs">${esc(x.authority||'local')}</span>
                </div>
                <h2 class="mt-1 text-2xl font-bold text-slate-900">${esc(x.title)}</h2>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <span class="rounded-full border border-orange-200 bg-orange-50 px-3 py-1 text-xs font-bold text-orange-800">${esc(x.status)}</span>
                <span class="rounded-full border border-blue-200 bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-800">${icon(x)} ${esc(x.sync_state||'local_only')}</span>
            </div>
        </div>

        <section class="mt-5">
            <h3 class="text-sm font-bold uppercase tracking-wide text-blue-900">Anforderung</h3>
            <p class="mt-2 leading-7 text-slate-800">${esc(x.text)}</p>
            <div class="mt-4 rounded-md border border-slate-200 bg-slate-50 p-4">
                <div class="text-xs font-bold uppercase tracking-wide text-slate-500">Begründung</div>
                <p class="mt-1 text-sm text-slate-700">${x.rationale?esc(x.rationale):'<span class="italic text-slate-400">Keine Begründung hinterlegt</span>'}</p>
            </div>
        </section>

        <section class="mt-6 grid gap-4 border-t border-slate-200 pt-5 sm:grid-cols-2 xl:grid-cols-4">
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Erstellt von</dt><dd class="mt-1 text-sm">${value(x.created_by)}</dd></div>
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Host</dt><dd class="mt-1 text-sm">${value(x.created_host)}</dd></div>
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Erstellt am</dt><dd class="mt-1 text-sm">${dateValue(x.created_at)}</dd></div>
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Quelle</dt><dd class="mt-1 text-sm">${value(x.created_source)}</dd></div>
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Letzte Änderung</dt><dd class="mt-1 text-sm">${dateValue(x.updated_at)}</dd></div>
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Bearbeitet von</dt><dd class="mt-1 text-sm">${value(x.updated_by)}</dd></div>
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Revision</dt><dd class="mt-1 text-sm">${value(x.revision,'Nicht vorhanden')}</dd></div>
            <div><dt class="text-xs font-bold uppercase tracking-wide text-slate-500">Speicherstatus</dt><dd class="mt-1 text-sm">${esc(x.read_only?'Read-only':'Bearbeitbar')}</dd></div>
        </section>

        <section class="mt-6 grid gap-4 border-t border-slate-200 pt-5 md:grid-cols-2">
            <div class="rounded-md border border-slate-200 p-4">
                <h3 class="font-bold text-blue-900">Parents</h3>
                <p class="mt-2 text-sm">${esc((x.parents||[]).join(', ')||'Keine')}</p>
            </div>
            <div class="rounded-md border border-slate-200 p-4">
                <h3 class="font-bold text-blue-900">Children</h3>
                <p class="mt-2 text-sm">${esc((x.children||[]).join(', ')||'Keine')}</p>
            </div>
        </section>

        <div class="mt-5 flex flex-wrap gap-2">
            <button id="editReq" class="rounded bg-blue-900 px-3 py-2 text-white">Bearbeiten</button>
            <button id="addDoc" class="rounded border px-3 py-2 text-blue-900">Dokument verlinken</button>
        </div>

        <section class="mt-7 border-t border-slate-200 pt-5">
            <h3 class="font-bold text-blue-900">Verknüpfte Dokumente</h3>
            <div class="mt-3 space-y-2">${linkedFiles.length?linkedFiles.map(card).join(''):'<p class="text-sm text-slate-500">Keine Dokumente verknüpft.</p>'}</div>
        </section>

        <section class="mt-7 border-t border-slate-200 pt-5">
            <h3 class="font-bold text-blue-900">Kommentare</h3>
            <div class="mt-3 space-y-2">${comments.length?comments.map(comment=>`
                <article class="rounded-md border border-slate-200 bg-slate-50 p-3">
                    <div class="flex justify-between gap-3 text-xs text-slate-500">
                        <b>${esc(comment.author)}</b><span>${esc(comment.created_at)}</span>
                    </div>
                    <p class="mt-2 text-sm text-slate-700">${esc(comment.text)}</p>
                </article>`).join(''):'<p class="text-sm text-slate-500">Keine Kommentare.</p>'}</div>
            <form id="commentForm" class="mt-4 flex gap-3">
                <textarea id="commentText" required rows="2" class="min-w-0 flex-1 rounded border border-slate-300 p-2 text-sm" placeholder="Kommentar hinzufügen"></textarea>
                <button class="self-end rounded bg-blue-900 px-4 py-2 text-sm font-semibold text-white">Senden</button>
            </form>
        </section>`;
    bindDocs(linkedFiles);
    $('editReq').onclick=()=>editReq(x);
    $('addDoc').onclick=()=>newLink(u);
    $('commentForm').onsubmit=async event=>{
        event.preventDefault();
        await api(`/requirements/${u}/comment`,{method:'POST',body:JSON.stringify({text:$('commentText').value})});
        await select(u);
    };
}
function card(x){return `<div class="rounded border p-3"><div class="flex justify-between"><b>${esc(x.label)}</b><button data-edit-doc="${x.id}" class="text-blue-800 underline">Bearbeiten</button></div><a class="text-blue-800 underline" target="_blank" href="${esc(x.location)}">${esc(x.location)}</a></div>`}function bindDocs(v){document.querySelectorAll('[data-edit-doc]').forEach(b=>b.onclick=()=>editLink(v.find(x=>x.id===b.dataset.editDoc)))}function vals(e){return[...e.selectedOptions].map(x=>x.value)}function newReq(){S.editing=false;$('reqForm').reset();$('reqHeading').textContent='Neue Anforderung';$('type').disabled=false;$('links').classList.remove('hidden');$('archiveReq').classList.add('hidden');$('restoreReq').classList.add('hidden');show('reqModal')}function editReq(x){S.editing=true;$('reqHeading').textContent=x.uid+' bearbeiten';$('type').value=x.type;$('type').disabled=true;$('title').value=x.title;$('text').value=x.text;$('rationale').value=x.rationale||'';$('links').classList.add('hidden');$('archiveReq').classList.toggle('hidden',x.status==='Archived');$('restoreReq').classList.toggle('hidden',x.status!=='Archived');show('reqModal')}function newLink(uid=''){S.editingLink=null;$('linkForm').reset();$('linkUid').value=uid;$('archiveLink').classList.add('hidden');$('restoreLink').classList.add('hidden');show('linkModal')}function editLink(x){S.editingLink=x;$('linkUid').value=x.requirement_uid||'';$('linkKind').value=x.kind.replace('archived:','');$('linkLabel').value=x.label;$('linkLocation').value=x.location;$('linkVersion').value=x.version||'';$('archiveLink').classList.toggle('hidden',x.kind.startsWith('archived:'));$('restoreLink').classList.toggle('hidden',!x.kind.startsWith('archived:'));show('linkModal')}async function archive(path){const reason=prompt('Grund ist erforderlich:');if(!reason)return;await api(path,{method:'POST',body:JSON.stringify({reason})});hide('reqModal');hide('linkModal');S.selected=null;await load();await docs()}
$('new').onclick=newReq;$('cancelReq').onclick=()=>hide('reqModal');$('reqForm').onsubmit=async e=>{e.preventDefault();const body={type:$('type').value,title:$('title').value,text:$('text').value,rationale:$('rationale').value,parents:vals($('parents')),children:vals($('children'))};await api(S.editing?`/requirements/${S.selected}/update`:'/requirements/create',{method:'POST',body:JSON.stringify(body)});hide('reqModal');await load()};$('archiveReq').onclick=()=>archive(`/requirements/${S.selected}/archive`);$('restoreReq').onclick=()=>archive(`/requirements/${S.selected}/restore`);document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{S.mode=b.dataset.mode;draw()});$('search').oninput=draw;document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.panel').forEach(x=>x.classList.remove('show'));$(t.dataset.panel).classList.add('show');if(t.dataset.panel==='documents')docs();if(t.dataset.panel==='history')history()});document.querySelectorAll('.cmd').forEach(b=>b.onclick=async()=>{const m=b.dataset.method||'POST',r=await api('/project/'+b.dataset.command,{method:m,body:m==='POST'?'{}':undefined});$('commandOut').textContent=r.output});async function docs(){S.docs=(await api('/documents')).documents||[];const v=S.docs.filter(x=>x.kind.startsWith('archived:')===S.docArchive);$('library').innerHTML=v.length?v.map(card).join(''):'Keine Einträge';bindDocs(v)}$('activeDocs').onclick=()=>{S.docArchive=false;docs()};$('archivedDocs').onclick=()=>{S.docArchive=true;docs()};$('globalLink').onclick=()=>newLink();$('cancelLink').onclick=()=>hide('linkModal');$('linkForm').onsubmit=async e=>{e.preventDefault();const x=S.editingLink,body={requirement_uid:$('linkUid').value,kind:$('linkKind').value,label:$('linkLabel').value,location:$('linkLocation').value,version:$('linkVersion').value,global:!$('linkUid').value};await api(x?`/documents/${x.id}/update`:'/documents/link',{method:'POST',body:JSON.stringify(body)});hide('linkModal');await docs();if(S.selected)await select(S.selected)};$('archiveLink').onclick=()=>archive(`/documents/${S.editingLink.id}/archive`);$('restoreLink').onclick=()=>archive(`/documents/${S.editingLink.id}/restore`);async function history(){const h=await api('/history');$('events').innerHTML=(h.web_events||[]).slice().reverse().map(x=>`<div class="grid grid-cols-[170px_160px_110px_1fr] rounded border p-3 text-sm"><span>${x.timestamp}</span><b>${x.action}</b><span>${x.object_uid}</span><span>${esc(x.detail)}</span></div>`).join('')}$('refreshHistory').onclick=history;$('push').onclick=async()=>{$('syncOut').textContent=JSON.stringify(await api('/sync/push',{method:'POST',body:'{}'}));load()};$('pull').onclick=async()=>{$('syncOut').textContent=JSON.stringify(await api('/sync/pull',{method:'POST',body:'{}'}));load()};api('/session').then(x=>$('session').textContent=`${x.user}@${x.host}`);load();
</script></body></html>
