<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Captain Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-800">
    <header class="bg-blue-900 text-white shadow-lg">
        <div class="mx-auto flex max-w-screen-2xl items-center justify-between px-6 py-8">
            <div class="flex items-center gap-6">
                <img src="logo.png" class="h-24 w-auto" alt="Captain Logo">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-[.2em] text-blue-200">Requirements Control Center
                    </p>
                    <h1 class="text-2xl font-bold">Captain</h1>
                    <p class="text-sm text-blue-100">Hybrid YAML + Management SQL</p>
                </div>
            </div>
            <div class="flex gap-3"><button id="sync"
                    class="rounded-md border border-blue-600 bg-blue-800 px-4 py-2 font-semibold hover:bg-blue-700">Sync
                    Pull</button><button id="new"
                    class="rounded-md bg-white px-4 py-2 font-semibold text-blue-900 hover:bg-blue-50">Neue
                    Anforderung</button></div>
        </div>
    </header>
    <main class="mx-auto grid max-w-screen-2xl gap-6 px-6 py-8 lg:grid-cols-[23rem_minmax(0,1fr)]">
        <aside class="self-start rounded-lg border border-slate-200 bg-white shadow-md lg:sticky lg:top-6">
            <div class="border-b border-slate-200 p-5">
                <h2 class="font-bold text-blue-900">Anforderungsbaum</h2><input id="search"
                    placeholder="UID oder Titel suchen"
                    class="mt-4 w-full rounded-md border border-slate-300 px-3 py-2">
            </div>
            <div id="tree" class="max-h-[70vh] overflow-auto p-4 text-sm">Lade Daten...</div>
        </aside>
        <section id="detail" class="rounded-lg border border-slate-200 bg-white p-6 shadow-md">
            <div class="flex min-h-72 items-center justify-center text-slate-500">Anforderung auswählen</div>
        </section>
    </main>
    <div id="toast" class="fixed bottom-5 right-5 hidden rounded-lg px-4 py-3 text-sm text-white shadow-xl"></div>
    <div id="createModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/50 p-4">
        <div class="max-h-[90vh] w-full max-w-2xl overflow-auto rounded-xl bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b p-5">
                <div>
                    <h2 class="text-xl font-bold text-blue-900">Neue Anforderung</h2>
                    <p id="routeHint" class="text-sm text-slate-500"></p>
                </div><button data-close="createModal" class="text-2xl">×</button>
            </div>
            <form id="createForm" class="space-y-4 p-6"><select id="type" class="w-full rounded-md border p-2">
                    <optgroup label="Lokal / Git">
                        <option>USR</option>
                        <option>SYS</option>
                        <option>SRS</option>
                        <option>SEC</option>
                        <option>ARCH</option>
                        <option>UT</option>
                        <option>IT</option>
                        <option>ST</option>
                    </optgroup>
                    <optgroup label="Zentral / SQL">
                        <option>RISK</option>
                        <option>CLASS</option>
                        <option>CR</option>
                        <option>SOUP</option>
                    </optgroup>
                </select><input id="title" required placeholder="Titel" class="w-full rounded-md border p-2"><textarea
                    id="text" rows="4" placeholder="Anforderungstext"
                    class="w-full rounded-md border p-2"></textarea><textarea id="rationale" rows="3"
                    placeholder="Begründung" class="w-full rounded-md border p-2"></textarea>
                <div class="grid gap-4 md:grid-cols-2"><label class="text-sm font-semibold">Parents<select id="parents"
                            multiple class="mt-1 h-36 w-full rounded-md border p-2 font-normal"></select></label><label
                        class="text-sm font-semibold">Children<select id="children" multiple
                            class="mt-1 h-36 w-full rounded-md border p-2 font-normal"></select></label></div>
                <div class="flex justify-end gap-3 border-t pt-4"><button type="button" data-close="createModal"
                        class="rounded-md border px-4 py-2">Abbrechen</button><button
                        class="rounded-md bg-blue-900 px-4 py-2 font-semibold text-white">Erstellen</button></div>
            </form>
        </div>
    </div>
    <div id="fileModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/50 p-4">
        <form id="fileForm" class="w-full max-w-lg space-y-4 rounded-xl bg-white p-6 shadow-2xl">
            <h2 class="text-xl font-bold text-blue-900">Dokument verlinken</h2><input id="fileLabel" required
                placeholder="Bezeichnung" class="w-full rounded-md border p-2"><select id="fileKind"
                class="w-full rounded-md border p-2">
                <option value="local_path">Lokaler Pfad</option>
                <option value="network_path">Netzwerkpfad</option>
                <option value="web_url">Web URL</option>
                <option value="document_management_id">DMS-ID</option>
            </select><input id="fileLocation" required placeholder="Pfad oder URL"
                class="w-full rounded-md border p-2"><input id="fileVersion" placeholder="Dokumentversion"
                class="w-full rounded-md border p-2">
            <div class="flex justify-end gap-3"><button type="button" data-close="fileModal"
                    class="rounded-md border px-4 py-2">Abbrechen</button><button
                    class="rounded-md bg-blue-900 px-4 py-2 text-white">Verlinken</button></div>
        </form>
    </div>
    <script>
        const API = '/api/v1', state = { items: [], selected: null }; const local = new Set(['USR', 'SYS', 'SRS', 'SEC', 'ARCH', 'LLD', 'TEST', 'UT', 'IT', 'ST', 'AT', 'BUG']); const $ = id => document.getElementById(id); const esc = s => String(s ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
        async function api(path, opt = {}) { const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opt }); const b = await r.json().catch(() => ({})); if (!r.ok) throw Error(b.error?.message || `API ${r.status}`); return b } function toast(m, bad = false) { $('toast').textContent = m; $('toast').className = `fixed bottom-5 right-5 rounded-lg px-4 py-3 text-sm text-white shadow-xl ${bad ? 'bg-red-700' : 'bg-green-700'}`; setTimeout(() => $('toast').classList.add('hidden'), 3500) } function open(id) { $(id).classList.replace('hidden', 'flex') } function close(id) { $(id).classList.replace('flex', 'hidden') } document.querySelectorAll('[data-close]').forEach(x => x.onclick = () => close(x.dataset.close));
        function by(uid) { return state.items.find(x => x.uid === uid) } function roots() { return state.items.filter(x => !(x.parents || []).length) } function node(x, seen = new Set()) { if (seen.has(x.uid)) return `<li class="ml-4 text-slate-400">${esc(x.uid)} Referenz</li>`; const n = new Set(seen); n.add(x.uid); const kids = (x.children || []).map(by).filter(Boolean); return `<li class="my-1"><button data-uid="${esc(x.uid)}" class="w-full rounded-md px-2 py-2 text-left hover:bg-slate-100 ${state.selected === x.uid ? 'bg-blue-50' : ''}"><b class="font-mono text-blue-900">${esc(x.uid)}</b><span class="block truncate">${esc(x.title)}</span><small class="text-slate-500">${esc(x.authority)}</small></button>${kids.length ? `<ul class="ml-4 border-l pl-3">${kids.map(k => node(k, n)).join('')}</ul>` : ''}</li>` }
        function drawTree() { const q = $('search').value.toLowerCase(); $('tree').innerHTML = `<ul>${roots().map(x => node(x)).join('')}</ul>`; $('tree').querySelectorAll('[data-uid]').forEach(b => { if (q && !b.textContent.toLowerCase().includes(q)) b.closest('li').classList.add('hidden'); b.onclick = () => select(b.dataset.uid) }) } function opts() { const h = state.items.map(x => `<option value="${esc(x.uid)}">${esc(x.uid)} · ${esc(x.title)}</option>`).join(''); $('parents').innerHTML = h; $('children').innerHTML = h } function selected(el) { return [...el.selectedOptions].map(x => x.value) }
        async function load() { state.items = (await api('/requirements')).items || []; drawTree(); opts(); if (state.selected && by(state.selected)) await select(state.selected) } async function select(uid) { state.selected = uid; drawTree(); const x = by(uid); $('detail').innerHTML = `<div class="flex justify-between gap-4 border-b pb-5"><div><b class="font-mono text-blue-900">${esc(x.uid)}</b><h2 class="text-2xl font-bold">${esc(x.title)}</h2><p class="mt-3 leading-7">${esc(x.text)}</p></div><div><span class="rounded-full border bg-orange-50 px-3 py-1 text-xs font-bold text-orange-800">${esc(x.status)}</span> <span class="rounded-full border bg-blue-50 px-3 py-1 text-xs font-bold text-blue-800">${esc(x.authority)}</span></div></div><div class="mt-6 grid gap-6 xl:grid-cols-2"><section><h3 class="font-bold text-blue-900">Traceability</h3><p class="mt-3">Parents: ${esc((x.parents || []).join(', ') || 'Keine')}</p><p>Children: ${esc((x.children || []).join(', ') || 'Keine')}</p></section><section><div class="flex justify-between"><h3 class="font-bold text-blue-900">Dokumente</h3><button id="addFile" class="text-sm font-semibold text-blue-800">+ Verlinken</button></div><div id="files" class="mt-3">Lade...</div></section></div><section class="mt-8 border-t pt-6"><h3 class="font-bold text-blue-900">Kommentare</h3><div id="comments" class="mt-3 space-y-3">Lade...</div><form id="commentForm" class="mt-4 flex gap-3"><textarea id="comment" required class="flex-1 rounded-md border p-2" placeholder="Kommentar"></textarea><button class="self-end rounded-md bg-blue-900 px-4 py-2 text-white">Senden</button></form></section>`; $('addFile').onclick = () => open('fileModal'); $('commentForm').onsubmit = comment; await Promise.all([loadComments(uid), loadFiles(uid)]) }
        async function loadComments(uid) { const a = (await api(`/requirements/${encodeURIComponent(uid)}/comments`)).comments || []; $('comments').innerHTML = a.length ? a.map(c => `<article class="rounded-md border bg-slate-50 p-3"><div class="flex justify-between text-xs text-slate-500"><b>${esc(c.author)}</b><span>${esc(c.created_at)}</span></div><p class="mt-2">${esc(c.text)}</p></article>`).join('') : '<p class="text-slate-500">Keine Kommentare</p>' } async function loadFiles(uid) { const a = (await api(`/requirements/${encodeURIComponent(uid)}/files`)).file_links || []; $('files').innerHTML = a.length ? a.map(f => `<div class="mb-2 rounded-md border p-3"><b>${esc(f.label)}</b><p class="break-all font-mono text-xs">${esc(f.location)}</p></div>`).join('') : '<p class="text-slate-500">Keine Dokumente</p>' }
        async function comment(e) { e.preventDefault(); try { await api(`/requirements/${encodeURIComponent(state.selected)}/comment`, { method: 'POST', body: JSON.stringify({ text: $('comment').value }) }); $('comment').value = ''; await loadComments(state.selected); toast('Kommentar gespeichert') } catch (e) { toast(e.message, true) } }
        $('new').onclick = () => { hint(); open('createModal') }; $('type').onchange = hint; function hint() { $('routeHint').textContent = local.has($('type').value) ? 'Lokale YAML in Git' : 'Zentrale Management-Datenbank' } $('createForm').onsubmit = async e => { e.preventDefault(); try { const body = await api('/requirements/create', { method: 'POST', body: JSON.stringify({ type: $('type').value, title: $('title').value, text: $('text').value, rationale: $('rationale').value, parents: selected($('parents')), children: selected($('children')) }) }); close('createModal'); e.target.reset(); await load(); await select(body.item.uid); toast(`${body.item.uid} erstellt`) } catch (e) { toast(e.message, true) } };
        $('fileForm').onsubmit = async e => { e.preventDefault(); try { await api(`/requirements/${encodeURIComponent(state.selected)}/link_file`, { method: 'POST', body: JSON.stringify({ label: $('fileLabel').value, kind: $('fileKind').value, location: $('fileLocation').value, version: $('fileVersion').value }) }); close('fileModal'); e.target.reset(); await loadFiles(state.selected); toast('Dokument verlinkt') } catch (e) { toast(e.message, true) } }; $('sync').onclick = async () => { try { const x = await api('/sync/pull', { method: 'POST', body: '{}' }); await load(); toast(`${x.pulled} Management-Objekte synchronisiert`) } catch (e) { toast(e.message, true) } }; $('search').oninput = drawTree; load().catch(e => toast(e.message, true));
    </script>
</body>

</html>
